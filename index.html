<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doctor Appointment Booking</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <!-- Navbar -->
    <header class="navbar">
        <div class="logo">HealthCare+</div>
        <nav>
            <a href="#home">Home</a>
            <a href="#doctors">Doctors</a>
            <a href="#appointment">Book Appointment</a>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero" id="home">
        <h1>Your Health, Our Priority</h1>
        <p>Book appointments with certified doctors anytime.</p>
        <a href="#appointment" class="btn">Book Now</a>
    </section>

    <!-- Doctors Section -->
    <section class="doctors" id="doctors">
        <h2>Our Doctors</h2>
        <div class="doctor-list">
            <div class="doctor-card">
                <img src="https://t3.ftcdn.net/jpg/02/95/51/80/360_F_295518052_aO5d9CqRhPnjlNDTRDjKLZHNftqfsxzI.jpg" alt=" Dr. MoreS"> 
                <h3>Dr. Rohan More</h3>
                <p>Cardiologist</p>
            </div>
            <div class="doctor-card">
                <img src="https://media.istockphoto.com/id/1562983761/photo/successful-smiling-doctor-working-inside-modern-clinic-office-hindu-man-in-white-medical-coat.jpg?s=612x612&w=0&k=20&c=MTyGOOgRVSNJEbiPSJHh8Aqxs6nQUSsdOMYvcJwEGY4=" alt="Dr. Barbate">
                <h3>Dr. Yash Barbate</h3>
                <p>Dermatologist</p>
            </div>
            <div class="doctor-card">
                <img src="https://media.istockphoto.com/id/1346124900/photo/confident-successful-mature-doctor-at-hospital.jpg?s=612x612&w=0&k=20&c=S93n5iTDVG3_kJ9euNNUKVl9pgXTOdVQcI_oDGG-QlE=" alt="Dr. Patel">
                <h3>Dr. Raj Patel</h3>
                <p>Orthopedic</p>
            </div>
        </div>
    </section>

    <!-- Appointment Form Section -->
    <section class="appointment-form" id="appointment">
        <h2>Book an Appointment</h2>
        <form>
            <label for="name">Full Name:</label>
            <input type="text" id="name" placeholder="Enter your full name" required />

            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="Enter your email" required />

            <label for="phone">Phone:</label>
            <input type="tel" id="phone" placeholder="Enter your phone number" required />

            <label for="doctor">Choose Doctor:</label>
            <select id="doctor">
                <option value="smith">Dr. Rohan More - Cardiologist</option>
                <option value="jane">Dr. Yash Barbate - Dermatologist</option>
                <option value="patel">Dr. Raj Patel - Orthopedic</option>
            </select>

            <label for="date">Appointment Date:</label>
            <input type="date" id="date" required />

            <label for="time">Time:</label>
            <input type="time" id="time" required />

            <button type="submit" class="btn">Book Appointment</button>
        </form>
    </section>
</body>

</html>
